server_tokens off;

limit_req_zone $binary_remote_addr zone=jesareko_static:10m rate=10r/s;

server {
    listen 80;
server_name jesareko.com www.jesareko.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
server_name jesareko.com www.jesareko.com;

    root /var/www/jesareko_landing/public;
    index index.html;
    autoindex off;

ssl_certificate /etc/letsencrypt/live/jesareko.com/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/jesareko.com/privkey.pem;

    limit_req zone=jesareko_static burst=40 nodelay;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/xml application/javascript application/json image/svg+xml;

    # Brotli requiere modulo nginx brotli instalado. Descomentar si aplica.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types text/plain text/css application/javascript application/json image/svg+xml;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'sha256-kDh1hJlV9RBg00xilqVT2aqpViVRp1TKqIiceQvEKw0='; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; form-action 'self'; navigate-to 'self' mailto: https://wa.me; upgrade-insecure-requests" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), clipboard-read=(), clipboard-write=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), publickey-credentials-get=(), screen-wake-lock=(), usb=(), web-share=(), xr-spatial-tracking=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-Download-Options "noopen" always;
    add_header X-XSS-Protection "0" always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* \.(env|ini|log|bak|backup|old|orig|sql|sqlite|db|yml|yaml|toml|lock|config|conf|ps1|sh|bat|cmd)$ {
        deny all;
    }

    location /assets/ {
        try_files $uri =404;
        expires 1d;
        add_header Cache-Control "public, max-age=86400, stale-while-revalidate=604800" always;
    }

    location = /robots.txt {
        try_files $uri =404;
        expires 1h;
    }

    location = /sitemap.xml {
        try_files $uri =404;
        expires 1h;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
